{% extends "base.html" %}

{% block title %}Page Not Found - Serviq{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 text-muted">404</h1>
            <h2 class="mb-4"><i class="fas fa-exclamation-triangle text-warning"></i> Page Not Found</h2>
            <p class="lead mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Return to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
