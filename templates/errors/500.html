{% extends "base.html" %}

{% block title %}Server Error - Serviq{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 text-muted">500</h1>

            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Return to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
