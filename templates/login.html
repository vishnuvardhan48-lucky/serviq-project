{% extends "base.html" %}

{% block title %}Login - Serviq{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Welcome Back</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">I am a:</label>
                            <select name="user_type" class="form-select" required>
                                <option value="customer">Customer (I want to book services)</option>
                                <option value="provider">Service Provider (I offer services)</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-2">Don't have an account?</p>
                        <a href="{{ url_for('register_customer') }}" class="btn btn-outline-primary btn-sm">Register as Customer</a>
                        <a href="{{ url_for('register_provider') }}" class="btn btn-outline-success btn-sm ms-2">Register as Provider</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
